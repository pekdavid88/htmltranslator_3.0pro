<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SEO HTML Fordító (CZ -> HU)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: #1e293b;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8">

    <div id="root" class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-6">
        <!-- Az App JavaScriptből töltődik be -->
    </div>

    <script>
        // --- Alkalmazás Állapota ---
        let state = {
            activeTab: 'input',
            htmlInput: '',
            rawKeywords: '',
            parsedKeywords: [],
            apiKey: localStorage.getItem('gemini_api_key') || '',
            isTranslating: false,
            translationResult: '',
            keywordStats: [],
            error: '',
            modelName: 'gemini-2.5-pro',
            timerSeconds: 0,
            lastDuration: 0,
            timerInterval: null
        };

        const models = [
            { id: 'gemini-2.5-pro', name: 'Gemini 2.5 Pro' },
            { id: 'gemini-3.1-pro-preview', name: 'Gemini 3.1 Pro Preview' }
        ];

        // --- Logika és Adatfeldolgozás ---

        function parseKeywords() {
            const lines = state.rawKeywords.split('\n');
            state.parsedKeywords = lines.map(line => {
                const trimmed = line.trim();
                if (!trimmed) return null;
                const match = trimmed.match(/(.+)\s+(\d+)$/);
                return match ? { word: match[1].trim(), volume: parseInt(match[2], 10) } : { word: trimmed, volume: 0 };
            }).filter(Boolean).sort((a, b) => b.volume - a.volume);
        }

        function countKeywordsInHtml(html) {
            if (!html) return [];
            return state.parsedKeywords.map(kw => {
                const word = kw.word.toLowerCase();
                const regex = new RegExp(word, 'gi');
                const matches = html.match(regex);
                return {
                    word: kw.word,
                    count: matches ? matches.length : 0
                };
            });
        }

        function postProcessHtml(html) {
            let processed = html;
            processed = processed.replace(/^```html\n?/, '').replace(/\n?```$/, '');
            processed = processed.replace(/(src|href)="([^"]+)\.cz([^"]*)"/g, '$1="$2.hu$3"');
            processed = processed.replace(/&nbsp;/g, ' ');
            processed = processed.replace(/\bzarovka\b/gi, 'zarovka100');
            processed = processed.replace(/class="article-bulletin[^"]*"/g, 'class="article-bulletin"');
            processed = processed.replace(/<li>\s*<strong>(A|Az)\s+/gi, '<li>$1 <strong>');
            return processed;
        }

        function startTimer() {
            state.timerSeconds = 0;
            state.timerInterval = setInterval(() => {
                state.timerSeconds++;
                const timerDisplay = document.getElementById('timer-display');
                if (timerDisplay) {
                    timerDisplay.innerText = state.timerSeconds + ' mp';
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(state.timerInterval);
            state.lastDuration = state.timerSeconds;
        }

        async function handleTranslation() {
            if (!state.apiKey) {
                updateState({ error: 'Hiba: Hiányzik az API kulcs!' });
                return;
            }
            if (!state.htmlInput) {
                updateState({ error: 'Hiba: Nincs beillesztett forráskód.' });
                return;
            }

            localStorage.setItem('gemini_api_key', state.apiKey);
            updateState({ isTranslating: true, error: '', translationResult: '', keywordStats: [], lastDuration: 0 });
            
            startTimer();

            const kwList = state.parsedKeywords.map(k => `- ${k.word} (${k.volume})`).join('\n');
            
            const prompt = `
SZEREP: Professzionális magyar SEO-szövegíró és fordító vagy.
FELADAT: Fordítsd le a megadott cseh nyelvű HTML tartalmat magyarra.

STÍLUS ÉS TARTALOM:
- HANGNEM: Közvetlen, TEGEZŐDŐ (vásárlóhoz szóló).
- STÍLUS: Egyszerű köznyelvi, trendi, webshop-kompatibilis, vásárlásra ösztönző.
- GEO: Magyarországra lokalizált tartalom.
- SEO: Használd a megadott kulcsszavakat természetes módon a szövegben ÉS ahol releváns, az "alt" attribútumokban is.

TECHNIKAI ELVÁRÁSOK:
- Ne változtass a HTML struktúrán.
- MINDEN URL-ben (src és href attribútumokban is!) a ".cz" részt írd át ".hu"-ra (pl. cdn.alza.cz -> cdn.alza.hu).
- Ne használj &nbsp; karaktereket, csak sima szóközt.
- A "zarovka" szó helyett mindig "zarovka100"-at írj.
- A <div class="article-bulletin"> ne tartalmazzon más extra class-t.
- Listaelemeknél (li) a névelő (A, Az) a <strong> tagon KÍVÜLRE kerüljön.
- Csak a tiszta HTML kódot add vissza, ne írj kommentárt vagy kódblokkot.
- Ha találsz a szövegben olyan hivatkozást, ahol a szövegben Bazar szó szerepel (például: <a href"...">Bazar</a>), akkor azt Outlet-nek fordítsd.


KULCSSZAVAK:
${kwList}

FORRÁS (CSEH):
${state.htmlInput}
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${state.modelName}:generateContent?key=${state.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(`API Hiba: ${data.error.message} (${data.error.code})`);
                }

                if (!data.candidates || data.candidates.length === 0) {
                    throw new Error('Az AI nem generált választ. Próbáld másik modellel.');
                }

                let translated = data.candidates[0].content.parts[0].text || '';
                const finalResult = postProcessHtml(translated);
                const stats = countKeywordsInHtml(finalResult);
                
                stopTimer();
                updateState({ translationResult: finalResult, keywordStats: stats, isTranslating: false });
            } catch (err) {
                console.error("Hiba történt:", err);
                stopTimer();
                updateState({ error: err.message, isTranslating: false });
            }
        }

        // --- UI Renderelés ---

        function updateState(newState) {
            state = { ...state, ...newState };
            if (newState.rawKeywords !== undefined) parseKeywords();
            render();
        }

        function render() {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="w-full lg:w-80 space-y-4">
                    <div class="glass-card rounded-2xl p-6 shadow-sm border border-indigo-100">
                        <div class="flex items-center gap-3 mb-8">
                            <div class="p-2 bg-indigo-600 rounded-lg text-white">
                                <i data-lucide="languages" class="w-6 h-6"></i>
                            </div>
                            <h1 class="text-xl font-bold text-slate-800 tracking-tight">SEO TransPro</h1>
                        </div>
                        
                        <nav class="space-y-1">
                            ${renderNavItem('input', 'Forráskód', 'file-code')}
                            ${renderNavItem('keywords', 'Kulcsszavak', 'bar-chart-3')}
                            ${renderNavItem('translate', 'Fordítás', 'sparkles')}
                        </nav>
                    </div>

                    <div class="glass-card rounded-2xl p-6 shadow-sm">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Beállítások</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">AI Modell</label>
                                <select id="model-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                                    ${models.map(m => `<option value="${m.id}" ${state.modelName === m.id ? 'selected' : ''}>${m.name}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">API Kulcs</label>
                                <input type="password" id="api-key" placeholder="Kulcs beillesztése..." value="${state.apiKey}" 
                                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex-1 glass-card rounded-3xl p-6 md:p-8 shadow-2xl min-h-[650px] flex flex-col border border-white">
                    ${renderActiveTab()}
                </div>
            `;
            lucide.createIcons();
            attachEvents();
        }

        function renderNavItem(id, label, icon) {
            const active = state.activeTab === id;
            return `
                <button onclick="updateState({activeTab: '${id}'})" 
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all
                    ${active ? 'bg-indigo-50 text-indigo-700 shadow-sm' : 'text-slate-500 hover:bg-slate-50'}">
                    <i data-lucide="${icon}" class="w-4 h-4"></i>
                    ${label}
                </button>
            `;
        }

        function renderActiveTab() {
            if (state.activeTab === 'input') {
                return `
                    <div class="flex-1 flex flex-col animate-in">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h2 class="text-2xl font-bold text-slate-800">Cseh forráskód</h2>
                                <p class="text-sm text-slate-500">Másold be ide a cseh HTML kódot</p>
                            </div>
                            <div class="bg-indigo-50 px-3 py-1 rounded-full text-indigo-600 text-xs font-bold">
                                ${state.htmlInput.length} karakter
                            </div>
                        </div>
                        <textarea id="html-editor" class="flex-1 w-full p-6 bg-slate-50 border border-slate-200 rounded-3xl font-mono text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all resize-none shadow-inner" placeholder="<p>Vložte HTML kód...</p>">${state.htmlInput}</textarea>
                    </div>
                `;
            }
            if (state.activeTab === 'keywords') {
                return `
                    <div class="flex-1 flex flex-col animate-in">
                        <div class="mb-4">
                            <h2 class="text-2xl font-bold text-slate-800">Kulcsszavak</h2>
                            <p class="text-sm text-slate-500">Kulcsszó és volumen (pl: led lámpa 500)</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 flex-1">
                            <textarea id="kw-editor" class="h-full min-h-[300px] p-6 bg-slate-50 border border-slate-200 rounded-3xl font-mono text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all resize-none shadow-inner" placeholder="zarovka 1200\nled svetlo 800...">${state.rawKeywords}</textarea>
                            <div class="bg-slate-50 rounded-3xl p-6 border border-slate-200 overflow-y-auto">
                                <h4 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-widest">Feldolgozva (${state.parsedKeywords.length})</h4>
                                <div class="space-y-2">
                                    ${state.parsedKeywords.map(k => `
                                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                            <span class="font-semibold text-slate-700 text-sm">${k.word}</span>
                                            <span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-lg text-[10px] font-bold">${k.volume}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            return `
                <div class="flex-1 flex flex-col animate-in">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800">Magyar kimenet</h2>
                            <div class="flex flex-wrap items-center gap-3 mt-1">
                                <div class="flex items-center gap-2 bg-slate-100 px-3 py-1 rounded-full text-xs text-slate-600 font-medium">
                                    <i data-lucide="align-left" class="w-3 h-3"></i>
                                    <span>${state.translationResult ? state.translationResult.length : 0} karakter</span>
                                </div>
                                <div class="flex items-center gap-2 bg-indigo-50 px-3 py-1 rounded-full text-xs text-indigo-600 font-bold">
                                    <i data-lucide="clock" class="w-3 h-3"></i>
                                    <span id="timer-display">${state.isTranslating ? state.timerSeconds + ' mp' : (state.lastDuration > 0 ? state.lastDuration + ' mp' : '0 mp')}</span>
                                </div>
                            </div>
                        </div>
                        <button id="run-btn" ${state.isTranslating ? 'disabled' : ''} 
                            class="bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-200 transition-all flex items-center gap-3">
                            ${state.isTranslating ? '<div class="w-5 h-5 border-3 border-white/30 border-t-white rounded-full animate-spin"></div>' : '<i data-lucide="zap" class="w-5 h-5"></i>'}
                            ${state.isTranslating ? 'Fordítás...' : 'Fordítás indítása'}
                        </button>
                    </div>
                    
                    ${state.error ? `<div class="bg-red-50 text-red-600 p-4 rounded-2xl mb-4 text-sm border border-red-100 flex items-center gap-3"><i data-lucide="alert-circle" class="w-5 h-5"></i> ${state.error}</div>` : ''}

                    <div class="grid grid-cols-1 ${state.keywordStats.length > 0 ? 'lg:grid-cols-4' : ''} gap-6 flex-1">
                        <div class="${state.keywordStats.length > 0 ? 'lg:col-span-3' : ''} relative group">
                            <textarea id="result-editor" readonly class="w-full h-full p-6 bg-slate-900 text-slate-300 rounded-3xl font-mono text-sm outline-none resize-none shadow-2xl border-4 border-slate-800 focus:border-indigo-500/30 transition-all" placeholder="Az eredmény itt jelenik meg...">${state.translationResult}</textarea>
                            ${state.translationResult ? `
                                <div class="absolute top-4 right-4">
                                    <button onclick="copyResult()" class="bg-white/10 hover:bg-white/20 text-white p-3 rounded-xl transition-all backdrop-blur-md" title="Másolás">
                                        <i data-lucide="copy" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            ` : ''}
                        </div>

                        ${state.keywordStats.length > 0 ? `
                            <div class="bg-slate-50 rounded-3xl p-5 border border-slate-200 overflow-y-auto animate-in">
                                <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest flex items-center gap-2">
                                    <i data-lucide="check-check" class="w-3 h-3"></i> Kulcsszó sűrűség
                                </h4>
                                <div class="space-y-3">
                                    ${state.keywordStats.map(s => `
                                        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-sm flex flex-col gap-1">
                                            <div class="flex justify-between items-start">
                                                <span class="text-xs font-bold text-slate-700 leading-tight">${s.word}</span>
                                                <span class="${s.count > 0 ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400'} px-2 py-0.5 rounded text-[10px] font-bold">
                                                    ${s.count}×
                                                </span>
                                            </div>
                                            <div class="w-full bg-slate-100 h-1 rounded-full mt-1 overflow-hidden">
                                                <div class="bg-indigo-500 h-full rounded-full transition-all duration-1000" style="width: ${Math.min(s.count * 20, 100)}%"></div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function attachEvents() {
            const htmlEditor = document.getElementById('html-editor');
            if (htmlEditor) htmlEditor.oninput = (e) => state.htmlInput = e.target.value;

            const kwEditor = document.getElementById('kw-editor');
            if (kwEditor) kwEditor.oninput = (e) => updateState({ rawKeywords: e.target.value });

            const modelSelect = document.getElementById('model-select');
            if (modelSelect) modelSelect.onchange = (e) => state.modelName = e.target.value;

            const apiKeyInput = document.getElementById('api-key');
            if (apiKeyInput) apiKeyInput.oninput = (e) => state.apiKey = e.target.value;

            const runBtn = document.getElementById('run-btn');
            if (runBtn) runBtn.onclick = handleTranslation;
        }

        function copyResult() {
            const el = document.getElementById('result-editor');
            el.select();
            document.execCommand('copy');
            const copyBtn = document.querySelector('[title="Másolás"]');
            copyBtn.innerHTML = '<i data-lucide="check" class="w-5 h-5 text-green-400"></i>';
            setTimeout(() => render(), 2000);
        }

        window.onload = render;
    </script>
</body>
</html>
